<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrollHide</title>
  <link rel="stylesheet" href="../../../assets/styles/tokens.css">
  <link rel="stylesheet" href="../../../assets/styles/popup.css">
</head>

<body>
  <div class="top-bar">
    <div id="domainDisplay" class="domain-display">loading...</div>
  </div>

  <div class="main-power-section">
    <button id="toggleScroll" class="power-btn" aria-label="Toggle hiding scrollbar" title="Toggle scrollbar">
      <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
        <line x1="12" y1="2" x2="12" y2="12"></line>
      </svg>
    </button>
  </div>

  <div class="bottom-controls">
    <button id="addCurrentBtn" class="control-btn add-btn" title="Add site to list">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>

    <button id="exportBtn" class="control-btn" title="Export data">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
    </button>

    <button id="importBtn" class="control-btn" title="Import data">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
    </button>
    <input type="file" id="importFile" accept=".json" hidden>

    <button id="toggleWhitelist" class="control-btn" aria-label="Toggle exception list" title="Toggle list">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="9" y1="3" x2="9" y2="21"></line>
      </svg>
    </button>
  </div>

  <div id="restrictedNotice" class="restricted-notice" data-i18n="restrictedNotice">
    Extension can't work on this page
  </div>

  <div id="whitelistedNotice" class="whitelisted-notice" data-i18n="whitelistedNotice">
    This site is in the exception list
  </div>

  <script src="../../shared/i18n.js"></script>
  <script src="../whitelist/whitelist-service.js"></script>
  <script src="popup.js"></script>
</body>

</html>
