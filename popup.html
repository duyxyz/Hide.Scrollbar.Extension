<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrollHide</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add,add_circle,block,close,warning" />
  <style>
    .material-symbols-rounded {
      font-size: 18px;
      vertical-align: middle;
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 20;
    }

    .material-symbols-rounded.sm {
      font-size: 16px;
    }

    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --border: #f0f0f0;
      --label: #444;
      --slider-bg: #ccc;
      --accent: #007aff;
      --secondary-bg: #f5f5f7;
      --danger: #ff3b30;
      --muted: #888;
      --input-bg: #f0f0f0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #232326;
        --text: #ffffff;
        --border: #2c2c2e;
        --label: #ebebf5;
        --slider-bg: #323234;
        --secondary-bg: #2c2c2e;
        --input-bg: #3a3a3c;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 280px;
      margin: 0;
      padding: 14px;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .header img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }

    .header h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
    }

    .header .switch {
      margin-left: auto;
    }

    .label {
      font-size: 14px;
      color: var(--label);
    }

    /* Minimal Switch */
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--slider-bg);
      border-radius: 20px;
      cursor: pointer;
      transition: .2s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: .2s;
    }

    input:checked+.slider {
      background: var(--accent);
    }

    input:checked+.slider:before {
      transform: translateX(16px);
    }


    /* Notices */
    .whitelisted-notice {
      margin-top: 12px;
      padding: 8px 12px;
      font-size: 12px;
      border-radius: 8px;
      background: rgba(255, 149, 0, 0.12);
      color: #ff9500;
      text-align: center;
      display: none;
    }

    .restricted-notice {
      margin-top: 12px;
      padding: 8px 12px;
      font-size: 12px;
      border-radius: 8px;
      background: rgba(255, 59, 48, 0.1);
      color: var(--danger);
      text-align: center;
      display: none;
    }

    /* Whitelist Section */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin: 14px 0 10px;
      padding-top: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .exception-count {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      margin-left: auto;
    }

    .add-current-btn {
      width: 100%;
      padding: 9px;
      font-size: 13px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: var(--secondary-bg);
      color: var(--muted);
      cursor: pointer;
      font-weight: 500;
      transition: all .2s;
    }

    .add-current-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .add-current-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .input-row input {
      flex: 1;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
    }

    .input-row input:focus {
      border-color: var(--accent);
    }

    .input-row button {
      padding: 8px 14px;
      font-size: 13px;
      border: none;
      border-radius: 8px;
      background: var(--secondary-bg);
      color: var(--text);
      cursor: pointer;
      font-weight: 500;
      transition: opacity .2s;
    }

    .input-row button:hover {
      opacity: 0.8;
    }

    /* Whitelist items */
    .whitelist {
      margin-top: 10px;
      max-height: 150px;
      overflow-y: auto;
    }

    .whitelist::-webkit-scrollbar {
      width: 4px;
    }

    .whitelist::-webkit-scrollbar-thumb {
      background: var(--muted);
      border-radius: 4px;
    }

    .whitelist-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      font-size: 13px;
      border-radius: 8px;
      background: var(--secondary-bg);
      margin-bottom: 6px;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .whitelist-item .domain {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 210px;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      opacity: 0.6;
      transition: opacity .2s;
      display: flex;
      align-items: center;
    }

    .remove-btn:hover {
      opacity: 1;
    }

    .empty-msg {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 12px 0;
    }
  </style>
</head>

<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Logo">
    <h1>Trang ơi tớ thích cậu</h1>
    <label class="switch">
      <input type="checkbox" id="toggleScroll" aria-label="Toggle hiding scrollbar">
      <span class="slider"></span>
    </label>
  </div>

  <div id="restrictedNotice" class="restricted-notice">
    Extension can't work on this page
  </div>

  <div id="whitelistedNotice" class="whitelisted-notice">
    <span class="material-symbols-rounded sm">warning</span> This site is in the exception list
  </div>

  <div class="section-title">Exceptions <span id="exceptionCount" class="exception-count"></span></div>
  <button id="addCurrentBtn" class="add-current-btn"><span class="material-symbols-rounded">add_circle</span> Add
    current site</button>

  <div class="input-row">
    <input type="text" id="domainInput" placeholder="example.com" aria-label="Domain to whitelist">
    <button id="addDomainBtn"><span class="material-symbols-rounded">add</span></button>
  </div>

  <div id="whitelistContainer" class="whitelist"></div>

  <script src="popup.js"></script>
</body>

</html>
