name: Release Chrome Extension

on:
  push:
    branches:
      - main
      - master # In case the default branch is named master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update manifest versions
        id: version
        run: |
          # Dùng jq để lấy phiên bản gốc và thêm số hiệu của GitHub Action run
          BASE_VERSION=$(jq -r '.version' manifest.json)
          NEW_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "Updating version from $BASE_VERSION to $NEW_VERSION"
          
          # Cập nhật manifest.json (Chrome)
          jq ".version = \"$NEW_VERSION\"" manifest.json > tmp.json && mv tmp.json manifest.json
          
          # Cập nhật manifest.firefox.json (Firefox)
          jq ".version = \"$NEW_VERSION\"" manifest.firefox.json > tmp.json && mv tmp.json manifest.firefox.json
          
          # Lưu version vào biến môi trường để dùng cho bước sau
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
      
      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Create Zip Archives
        run: |
          # --- BUILD CHROME VERSION ---
          # Nén tất cả thành 1 file zip, ngoại trừ manifest của Firefox
          zip -r extension-chrome-v${{ env.VERSION }}.zip . -x "*.git*" "*.github*" "*.vscode*" "*.hintrc" "README.md" "manifest.firefox.json" "tmp.json" "build.ps1"
          
          # --- BUILD FIREFOX VERSION ---
          # Đổi tên manifest.firefox.json thành manifest.json chuẩn cho Add-on
          mv manifest.firefox.json manifest.json
          
          # Resize Firefox icons correctly using system mogrify
          mogrify -resize 48x48 icons/icon48.png
          mogrify -resize 128x128 icons/icon128.png
          
          zip -r extension-firefox-v${{ env.VERSION }}.zip . -x "*.git*" "*.github*" "*.vscode*" "*.hintrc" "README.md" "manifest.firefox.json" "tmp.json" "build.ps1"
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: |
            extension-chrome-v${{ env.VERSION }}.zip
            extension-firefox-v${{ env.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
