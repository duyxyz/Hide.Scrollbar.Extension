name: Release Chrome Extension

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update manifest versions
        id: version
        run: |
          BASE_VERSION=$(jq -r '.version' platform/chromium/manifest.json)
          NEW_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "Updating version from $BASE_VERSION to $NEW_VERSION"

          jq ".version = \"$NEW_VERSION\"" platform/chromium/manifest.json > tmp.json && mv tmp.json platform/chromium/manifest.json
          jq ".version = \"$NEW_VERSION\"" platform/firefox/manifest.json > tmp.json && mv tmp.json platform/firefox/manifest.json

          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Create Zip Archives
        run: |
          cp platform/chromium/manifest.json manifest.json
          cp src/shared/browser-api.chrome.js src/shared/browser-api.js
          zip -r extension-chrome-v${{ env.VERSION }}.zip . -x "*.git*" "*.github*" "*.vscode*" "*.hintrc" "README.md" "tmp.json" "scripts/*" "platform/*" "*.zip" "src/shared/browser-api.chrome.js" "src/shared/browser-api.firefox.js" "test-builds/*"

          rm manifest.json
          rm src/shared/browser-api.js

          cp platform/firefox/manifest.json manifest.json
          cp src/shared/browser-api.firefox.js src/shared/browser-api.js
          zip -r extension-firefox-v${{ env.VERSION }}.zip . -x "*.git*" "*.github*" "*.vscode*" "*.hintrc" "README.md" "tmp.json" "scripts/*" "platform/*" "*.zip" "src/shared/browser-api.chrome.js" "src/shared/browser-api.firefox.js" "test-builds/*"

          rm manifest.json
          rm src/shared/browser-api.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: |
            extension-chrome-v${{ env.VERSION }}.zip
            extension-firefox-v${{ env.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
